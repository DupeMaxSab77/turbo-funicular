# fly.toml app configuration file generated for turbo-funicular on 2026-06-27T01:29:47Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'turbo-funicular'
primary_region = 'dfw'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[vm]]
  memory = '128gb'
  cpu_kind = 'performance'
  cpus = 16
  memory_mb = 131072
  processes = ['app']
  size = 'performance-cpu-16x'
